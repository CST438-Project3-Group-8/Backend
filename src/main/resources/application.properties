spring.application.name=spring-boot-docker

# Database Connection (Safe version)
spring.datasource.url=jdbc:postgresql://db.vosutyyfirytxbisusvh.supabase.co:5432/postgres
spring.datasource.username=postgres
# Use a variable instead of the raw password
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT Auth (Safe to keep as is, it's a public URL)
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://vosutyyfirytxbisusvh.supabase.co/auth/v1

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect